<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>
    <style>
        body {
            font-family: Arial;
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h2>Diabetes Prediction</h2>

<form id="predictionForm">
    <select id="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>

    <input type="number" id="age" placeholder="Age" required>
    <input type="number" id="hypertension" placeholder="Hypertension (0/1)" required>
    <input type="number" id="heart_disease" placeholder="Heart Disease (0/1)" required>

    <select id="smoking_history">
        <option value="never">Never</option>
        <option value="former">Former</option>
        <option value="current">Current</option>
    </select>

    <input type="number" step="0.1" id="bmi" placeholder="BMI" required>
    <input type="number" step="0.1" id="hba1c" placeholder="HbA1c Level" required>
    <input type="number" id="glucose" placeholder="Blood Glucose Level" required>

    <button type="submit">Predict</button>
</form>

<h3 id="result"></h3>

<script>
document.getElementById("predictionForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        gender: document.getElementById("gender").value,
        age: Number(document.getElementById("age").value),
        hypertension: Number(document.getElementById("hypertension").value),
        heart_disease: Number(document.getElementById("heart_disease").value),
        smoking_history: document.getElementById("smoking_history").value,
        bmi: Number(document.getElementById("bmi").value),
        HbA1c_level: Number(document.getElementById("hba1c").value),
        blood_glucose_level: Number(document.getElementById("glucose").value)
    };

    try {
        const response = await fetch("https://diabetes-prediction-system-pi.vercel.app/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("result").innerText =
            result.prediction ? "Result: " + result.prediction : "Error: " + result.error;

    } catch (error) {
    console.error(error);  // 👈 ADD THIS
    document.getElementById("result").innerText = "Request failed: " + error.message;
}
});
</script>

</body>
</html>
